    <title>Redirecionando...</title>
    <script>
        // Redirecionar URLs antigas do WordPress para a home
        const path = window.location.pathname;
        
        // URLs que devem redirecionar
        const shouldRedirect = [
            '/sobre-nos',
            '/pagina-padrao',
            '/ouvidoria',
            '/doe-1',
            '/fale-conosco',
            '/tag/',
            '/wp-admin',
            '/wp-login',
            '/wp-includes',
            '/wp-content'
        ];
        
        // Verifica se a URL atual contém alguma das URLs antigas
        let isOldUrl = shouldRedirect.some(url => path.includes(url)) || 
                      /\/\d{4}\/\d{2}\/\d{2}\//.test(path); // Formato de post antigo
        
        if (isOldUrl) {
            // Redireciona para a home
            window.location.href = '/';
        }
    </script>
